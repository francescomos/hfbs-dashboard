<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HFBS — Executive Education Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js" defer></script>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo-mark">
      <div class="logo-glyph">HF</div>
      <div class="logo-txt">
        <b>Executive Education</b>
        <small>DATALAKE · DASHBOARD OPERATIVA</small>
      </div>
    </div>
  </div>
  <div class="topbar-right">
    <span class="pill"><span class="live-dot"></span>LIVE</span>
    <span class="pill pill-ghost" id="last-update">—</span>
    <button class="btn" id="btn-change-url" title="Cambia URL del datalake">URL</button>
    <button class="btn btn-green" id="btn-refresh">Aggiorna</button>
  </div>
</div>

<div class="setup hidden" id="setup">
  <span>Datalake URL:</span>
  <input type="text" id="url-input" placeholder="Incolla URL del Web App…">
  <button id="btn-save-url">Salva e carica</button>
</div>

<div class="header">
  <div class="header-title">
    <div class="eyebrow">Dashboard Operativa</div>
    <h1>Executive <span class="accent">Education</span></h1>
    <div class="sub" id="header-sub">Caricamento dati dal datalake…</div>
  </div>
  <div class="header-right">
    <div class="today-chip" id="today-chip"></div>
  </div>
</div>

<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab active" data-tab="panoramica">Panoramica <span class="num">01</span></button>
    <button class="tab" data-tab="prodotto">Per prodotto <span class="num">02</span></button>
    <button class="tab" data-tab="marketing">Marketing <span class="num">03</span></button>
    <button class="tab" data-tab="insights">Insights <span class="num">04</span></button>
    <button class="tab" data-tab="qualita">Qualità <span class="num">05</span></button>
    <button class="tab" data-tab="pl">P&L Prodotti <span class="num">06</span></button>
    <button class="tab" data-tab="plop">P&L OP <span class="num">07</span></button>
    <button class="tab" data-tab="monitor">Monitor fonti <span class="num">08</span></button>
  </div>
</div>

<div class="tab-panel active" id="tab-panoramica">
  <div class="kpi-grid" id="kpi-row"></div>
  <div id="suggestions-wrap"></div>
  <div class="filters" id="filters"></div>
  <div class="corso-grid" id="corso-grid">
    <div class="empty-state"><h3>Caricamento…</h3></div>
  </div>
</div>

<div class="tab-panel" id="tab-prodotto">
  <div class="prod-select-wrap">
    <label>Prodotto</label>
    <select class="prod-select" id="prod-select">
      <option value="">— seleziona prodotto —</option>
    </select>
  </div>
  <div id="prod-detail">
    <div class="empty-state"><h3>Seleziona un prodotto</h3></div>
  </div>
</div>

<div class="tab-panel" id="tab-marketing">
  <div id="marketing-content">
    <div class="empty-state"><h3>Carica i dati</h3></div>
  </div>
</div>

<div class="tab-panel" id="tab-insights">
  <div id="insights-content">
    <div class="empty-state"><h3>Carica i dati</h3></div>
  </div>
</div>

<div class="tab-panel" id="tab-qualita">
  <div id="qualita-content">
    <div class="empty-state"><h3>Carica i dati</h3></div>
  </div>
</div>

<div class="tab-panel" id="tab-pl">
  <div id="pl-content">
    <div class="empty-state"><h3>Carica i dati</h3></div>
  </div>
</div>

<div class="tab-panel" id="tab-plop">
  <div id="plop-content">
    <div class="empty-state"><h3>Carica i dati</h3></div>
  </div>
</div>

<div class="tab-panel" id="tab-monitor">
  <div id="monitor-global"></div>
  <h3 style="font-size:16px;font-weight:800;margin:24px 0 14px;color:var(--ink)">Stato fonti per prodotto</h3>
  <div class="monitor-grid" id="monitor-per-prod"></div>
</div>

<script type="module" src="src/main.js"></script>
</body>
</html>
