<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HFBS Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">H-FARM <span>Business School</span></div>
    <div class="header-sub">Executive Education Dashboard</div>
  </div>
  <div class="header-right">
    <span class="last-update" id="last-update"></span>
    <button class="btn" id="btn-change-url" title="Cambia URL del datalake">URL</button>
    <button class="btn btn-green" id="btn-refresh">Aggiorna</button>
  </div>
</div>

<div class="setup hidden" id="setup">
  <span>Datalake URL:</span>
  <input type="text" id="url-input" placeholder="Incolla URL del Web App…">
  <button id="btn-save-url">Salva e carica</button>
</div>

<div class="tabs">
  <div class="tab active" data-tab="panoramica">Panoramica</div>
  <div class="tab" data-tab="prodotto">Per prodotto</div>
  <div class="tab" data-tab="marketing">Marketing</div>
  <div class="tab" data-tab="insights">Insights</div>
  <div class="tab" data-tab="qualita">Qualità</div>
  <div class="tab" data-tab="pl">P&L Prodotti</div>
  <div class="tab" data-tab="plop">P&L OP</div>
  <div class="tab" data-tab="monitor">Monitor fonti</div>
</div>

<div class="tab-panel active" id="tab-panoramica">
  <div class="kpi-row" id="kpi-row"></div>
  <div class="filters" id="filters"></div>
  <div class="corso-grid" id="corso-grid">
    <div class="empty-state"><h3>Caricamento…</h3></div>
  </div>
</div>

<div class="tab-panel" id="tab-prodotto">
  <div class="prod-select-wrap">
    <label style="font-size:14px;font-weight:600;color:var(--text2)">Prodotto</label>
    <select class="prod-select" id="prod-select">
      <option value="">— seleziona prodotto —</option>
    </select>
  </div>
  <div id="prod-detail">
    <div class="empty-state"><h3>Seleziona un prodotto</h3></div>
  </div>
</div>

<div class="tab-panel" id="tab-marketing">
  <div id="marketing-content">
    <div class="empty-state"><h3>Carica i dati</h3></div>
  </div>
</div>

<div class="tab-panel" id="tab-insights">
  <div id="insights-content">
    <div class="empty-state"><h3>Carica i dati</h3></div>
  </div>
</div>

<div class="tab-panel" id="tab-qualita">
  <div id="qualita-content">
    <div class="empty-state"><h3>Carica i dati</h3></div>
  </div>
</div>

<div class="tab-panel" id="tab-pl">
  <div id="pl-content">
    <div class="empty-state"><h3>Carica i dati</h3></div>
  </div>
</div>

<div class="tab-panel" id="tab-plop">
  <div id="plop-content">
    <div class="empty-state"><h3>Carica i dati</h3></div>
  </div>
</div>

<div class="tab-panel" id="tab-monitor">
  <div id="monitor-global"></div>
  <h3 style="font-size:16px;font-weight:700;margin:24px 0 14px">Stato fonti per prodotto</h3>
  <div class="monitor-grid" id="monitor-per-prod"></div>
</div>

<script type="module" src="src/main.js"></script>
</body>
</html>
