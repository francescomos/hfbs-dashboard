<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HFBS Dashboard v8</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f4f1;--card:#fff;--border:#d5d3ce;--border-l:#e8e6e0;--text1:#111110;--text2:#4a4944;--text3:#7a7872;--green:#157a52;--green-l:#ddf2e8;--red:#c41e1e;--red-l:#fdeeed;--amber:#b86600;--amber-l:#fff7e6;--yellow:#ca9c00;--blue:#1d4ed8;--blue-l:#e8f0fe;--purple:#6d28d9;--hfarm:#00a682;--hfarm-d:#00775e;--radius:10px;--radius-sm:6px;--font:'Instrument Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--font);background:var(--bg);color:var(--text1);font-size:16px;line-height:1.5}
.header{background:#f0efe8;border-bottom:1px solid var(--border);padding:14px 32px;display:flex;justify-content:space-between;align-items:center}
.header-title{font-size:16px;font-weight:700;letter-spacing:-.02em}.header-title span{color:var(--hfarm)}.header-sub{font-size:12px;color:var(--text3)}
.header-right{display:flex;align-items:center;gap:12px}.last-update{font-size:11px;color:var(--text3)}
.btn{padding:8px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card);color:var(--text1);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font)}.btn:hover{background:var(--bg)}
.btn-green{background:var(--hfarm);border-color:var(--hfarm);color:#fff}.btn-green:hover{background:var(--hfarm-d)}
.setup{padding:12px 32px;background:var(--amber-l);display:flex;align-items:center;gap:8px;font-size:13px;border-bottom:1px solid var(--border)}.setup.hidden{display:none}
.setup input{flex:1;padding:7px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:var(--font)}
.setup button{padding:7px 16px;background:var(--text1);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-family:var(--font);font-weight:600}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 32px;background:var(--card)}
.tab{padding:14px 22px;font-size:14px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2.5px solid transparent}.tab:hover{color:var(--text1)}.tab.active{color:var(--hfarm);border-bottom-color:var(--hfarm)}
.tab-panel{display:none;padding:24px 32px}.tab-panel.active{display:block}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;cursor:pointer;transition:all .15s}.kpi:hover{box-shadow:0 2px 8px rgba(0,0,0,.06);border-color:var(--hfarm)}.kpi.active-sort{border-color:var(--hfarm);box-shadow:0 0 0 2px rgba(0,184,148,.15)}
.kpi-label{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.kpi-value{font-size:31px;font-weight:700;font-family:var(--mono);line-height:1.1}.kpi-sub{font-size:13px;color:var(--text2);margin-top:5px}
.filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.filter-pill{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:var(--card);font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);font-family:var(--font)}.filter-pill.active{background:var(--text1);color:#fff;border-color:var(--text1)}
.corso-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.corso-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;border-left:4px solid var(--border)}.corso-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.06)}
.corso-card.zona-rossa{border-left-color:var(--red);background:var(--red-l)}
.corso-zr{font-size:11px;font-weight:700;color:var(--red);margin-bottom:8px}
.corso-name{font-size:17px;font-weight:700;margin-bottom:3px}
.corso-meta{font-size:13px;color:var(--text3);margin-bottom:6px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.corso-tag{padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600;line-height:1;display:inline-block}
.tag-intake{background:var(--blue-l);color:var(--blue)}.tag-tipo{background:#e8e6e0;color:var(--text2)}
.tag-ok,.ed-status-active{background:var(--green-l);color:var(--green)}.tag-warn{background:var(--red-l);color:var(--red)}
.ed-status{padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600;line-height:1;display:inline-block;margin-bottom:0}
.ed-status-selling{background:var(--blue-l);color:var(--blue)}.ed-status-done{background:#e8e6e0;color:var(--text3)}
.corso-date{font-size:13px;color:var(--text2);margin-bottom:8px}
.prog{margin-bottom:10px}.prog-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}.prog-label{font-size:13px;color:var(--text2)}.prog-nums{display:flex;align-items:baseline;gap:4px}
.prog-iscritti{font-family:var(--mono);font-size:23px;font-weight:700}.prog-target{font-family:var(--mono);font-size:14px;color:var(--text3)}.prog-pct{font-family:var(--mono);font-size:14px;font-weight:600;margin-left:6px}
.prog-bar{height:8px;background:#f0efe8;border-radius:4px;overflow:visible;position:relative}.prog-fill{height:100%;border-radius:4px}.prog-marker{position:absolute;top:-3px;width:2px;height:14px;background:var(--text1);border-radius:1px}
.rev-line{font-size:14px;color:var(--text2);margin-bottom:10px}.rev-line b{color:var(--green)}
.funnel{display:flex;align-items:flex-end;gap:3px;height:64px;margin:12px 0 6px;overflow:hidden}
.funnel-step{display:flex;flex-direction:column;align-items:center;flex:1;height:100%;justify-content:flex-end}
.funnel-bar{width:100%;border-radius:4px 4px 0 0;min-height:4px}
.funnel-info{text-align:center;margin-top:4px}.funnel-num{font-family:var(--mono);font-size:16px;font-weight:700}.funnel-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-top:1px}
.prod-select-wrap{display:flex;align-items:center;gap:14px;margin-bottom:20px;background:var(--card);padding:16px 22px;border-radius:var(--radius);border:1px solid var(--border)}
.prod-select{padding:10px 18px;border:2px solid var(--border);border-radius:var(--radius);font-size:16px;font-family:var(--font);font-weight:600;min-width:300px;background:var(--bg);cursor:pointer}.prod-select:focus{border-color:var(--hfarm);outline:none}
.prod-header{background:var(--card);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;padding:22px 26px}.prod-title{font-size:23px;font-weight:700;letter-spacing:-.02em}.prod-subtitle{font-size:14px;color:var(--text2);margin-top:5px}
.prod-section{background:var(--card);border:1px solid var(--border);border-top:none;padding:20px 26px}.prod-section:last-child{border-radius:0 0 var(--radius) var(--radius)}
.prod-section-title{font-size:13px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border-l)}
.ed-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.ed-card{background:var(--bg);border-radius:var(--radius-sm);padding:14px 16px}.ed-label{font-size:14px;font-weight:700;margin-bottom:2px}.ed-big{font-family:var(--mono);font-size:25px;font-weight:700}.ed-stat{font-size:13px;color:var(--text2);margin-top:2px}
.ed-mktg{font-size:12px;color:var(--text3);margin-top:6px;padding-top:6px;border-top:1px solid var(--border-l)}
.stage-row{display:flex;gap:5px;flex-wrap:wrap}.stage-badge{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;color:#fff}
.mtable{width:100%;border-collapse:collapse;font-size:14px}.mtable th{text-align:left;font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;padding:8px 10px;border-bottom:2px solid var(--border)}.mtable td{padding:8px 10px;border-bottom:1px solid var(--border-l)}.mtable .num{font-family:var(--mono);font-weight:500;text-align:right}
.mtable tr.row-sub td{background:var(--bg);font-weight:700}.mtable tr.row-tot td{background:#f0efe8;font-weight:700;border-top:2px solid var(--border)}
.cell-good{color:var(--green);font-weight:700}.cell-bad{color:var(--red);font-weight:700}
.monitor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}.monitor-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px}.monitor-card-title{font-size:15px;font-weight:700;margin-bottom:10px}
.monitor-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:14px}.monitor-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}.dot-ok{background:var(--green)}.dot-warn{background:var(--amber)}.dot-miss{background:var(--red)}.monitor-label{flex:1;color:var(--text2)}.monitor-val{font-family:var(--mono);font-size:12px;font-weight:500}
.badge{padding:3px 10px;border-radius:12px;font-size:12px;font-weight:700;display:inline-block}.badge-ok{background:var(--green-l);color:var(--green)}.badge-warn{background:var(--amber-l);color:var(--amber)}.badge-bad{background:var(--red-l);color:var(--red)}
.loading{display:flex;align-items:center;justify-content:center;padding:80px;flex-direction:column;gap:12px;color:var(--text3)}.spinner{width:24px;height:24px;border:2.5px solid var(--border);border-top-color:var(--hfarm);border-radius:50%;animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}.empty-state h3{font-size:17px;color:var(--text2);margin-bottom:6px}
@media(max-width:900px){.ed-row{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){
.header,.tabs,.tab-panel,.setup{padding-left:12px;padding-right:12px}
.kpi-row{grid-template-columns:repeat(2,1fr)}.corso-grid{grid-template-columns:1fr}.tab{padding:10px 12px;font-size:13px}.ed-row{grid-template-columns:1fr}
.prod-select{min-width:auto;width:100%}.prod-select-wrap{flex-direction:column;align-items:stretch}
.kpi-value{font-size:24px}.prog-iscritti{font-size:20px}.monitor-grid{grid-template-columns:1fr!important}.mtable{font-size:12px}
}
</style>
</head>
<body>
<div class="header"><div><div class="header-title">H-FARM <span>Business School</span></div><div class="header-sub">Executive Education Dashboard v8</div></div><div class="header-right"><span class="last-update" id="last-update"></span><button class="btn btn-green" onclick="refreshData()">Aggiorna</button></div></div>
<div class="setup" id="setup"><span>Datalake URL:</span><input type="text" id="url-input" placeholder="Incolla URL del Web App…"><button onclick="saveUrl()">Salva e carica</button></div>
<div class="tabs"><div class="tab active" onclick="switchTab('panoramica',this)">Panoramica</div><div class="tab" onclick="switchTab('prodotto',this)">Per prodotto</div><div class="tab" onclick="switchTab('marketing',this)">Marketing</div><div class="tab" onclick="switchTab('insights',this)">Insights</div><div class="tab" onclick="switchTab('qualita',this)">Qualità</div><div class="tab" onclick="switchTab('pl',this)">P&L</div><div class="tab" onclick="switchTab('monitor',this)">Monitor fonti</div></div>
<div class="tab-panel active" id="tab-panoramica"><div class="kpi-row" id="kpi-row"></div><div class="filters" id="filters"></div><div class="corso-grid" id="corso-grid"><div class="empty-state"><h3>Configura il datalake</h3><p>Incolla URL in alto.</p></div></div></div>
<div class="tab-panel" id="tab-prodotto"><div class="prod-select-wrap"><label style="font-size:14px;font-weight:600;color:var(--text2)">Prodotto</label><select class="prod-select" id="prod-select" onchange="renderProdotto()"><option value="">— seleziona prodotto —</option></select></div><div id="prod-detail"><div class="empty-state"><h3>Seleziona un prodotto</h3></div></div></div>
<div class="tab-panel" id="tab-insights"><div id="insights-content"><div class="empty-state"><h3>Carica i dati</h3></div></div></div>
<div class="tab-panel" id="tab-qualita"><div id="qualita-content"><div class="empty-state"><h3>Carica i dati</h3></div></div></div>
<div class="tab-panel" id="tab-pl"><div id="pl-content"><div class="empty-state"><h3>Carica i dati</h3></div></div></div>
<div class="tab-panel" id="tab-marketing"><div id="marketing-content"><div class="empty-state"><h3>Carica i dati</h3></div></div></div>
<div class="tab-panel" id="tab-monitor"><div id="monitor-global"></div><h3 style="font-size:16px;font-weight:700;margin:24px 0 14px">Stato fonti per prodotto</h3><div class="monitor-grid" id="monitor-per-prod"></div></div>

<script>
// ================================================================
// HFBS Dashboard v8 — file definitivo con TUTTI i fix applicati
// ================================================================
// CHANGELOG v8:
//   - Spend REALE da Meta_Campaigns.spend + GAds_Campaigns.cost (NON Mktg_ExEd)
//   - Date italiane GG/mm ovunque
//   - Daily trend: date sotto ogni barra, separatori W/M, layout a 3 zone
//   - P&L: header+intake merged su una riga con sfondo #ddd8d0
//   - P&L orphans: brand (blu) separati da orphan (ambra), filtro >€50
//   - P&L scenario 50% per corsi futuri
//   - Etichette canali allineate sotto segmento
//   - Overlap candidati con nomi corsi specifici
//   - Monitor fonti con padding tra colonne
//   - Brochure con nome completo corso + sigla
//   - Insights marginalità: riga campagne generiche prima del totale
//   - Separatori " | " ovunque
//   - Badge card "X mktg"
//   - fEk() per numeri abbreviati
// ================================================================

let DL = null, _corsiCache = null;
const STATE = {filter:'all', sortBy:null, selectedEdition:null};

const IF  = {FA24:'Fall 24',FA25:'Fall 25',WI25:'Winter 25',WI26:'Winter 26',SP25:'Spring 25',SP26:'Spring 26',SU25:'Summer 25',SU26:'Summer 26'};
const IS  = {'FALL 24':'FA24','FALL 25':'FA25','WINTER 25':'WI25','WINTER 26':'WI26','SPRING 25':'SP25','SPRING 26':'SP26','SUMMER 25':'SU25','SUMMER 26':'SU26'};
const TL  = {PM:'Professional Master',ME:'Master Executive',MB:'MBA',MBA:'MBA',IC:'Impact Course',RE:'Retreat',LR:'Retreat',SS:'Summer School',EM:'Executive Master'};
const SC  = {Booked:'#3b82f6',Interviewed:'#7c3aed',Negotiation:'#f59e0b','Contract pending':'#d97706','Closed Won':'#22c55e','Closed Lost':'#dc2626','No Show':'#991b1b',Canceled:'#9ca3af',Rescheduled:'#60a5fa'};
const PA  = {RE1:'RE',HP1:'HP',AW:'AW1'};
const MESI_IT = ['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];

const nI = c => { if(!c)return''; c=c.toUpperCase(); if(/^(FA|WI|SP|SU)\d{2}$/.test(c))return c; const m=c.match(/^([A-Z])(\d{2})$/); if(m){const p={W:'WI',F:'FA',S:'SP'};if(p[m[1]])return p[m[1]]+m[2];} return c; };
const nP = p => { p=(p||'').toUpperCase(); return PA[p]||p; };

// ── Helpers generici ─────────────────────────────────────────────
const fE  = n => n?'€'+Math.round(n).toLocaleString('it-IT'):'€0';
const fEk = n => {if(!n)return'€0';if(Math.abs(n)>=1000000)return'€'+(n/1000000).toFixed(1)+'M';if(Math.abs(n)>=10000)return'€'+Math.round(n/1000)+'k';return'€'+Math.round(n).toLocaleString('it-IT');};
// v8: date italiane GG/mm
const fD  = s => { if(!s)return''; try{const d=new Date(s);if(isNaN(d))return s;return d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'});}catch(e){return s;} };
const fDshort = s => { if(!s)return''; try{const d=new Date(s);if(isNaN(d))return s;return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');}catch(e){return s;} };
const dTS = c => { const s=c.startDate||''; if(!s)return -999; try{const d=new Date(s);if(isNaN(d))return -999;return Math.floor((d-Date.now())/864e5);}catch(e){return -999;} };
const cSt = c => { const d=dTS(c); if(d>0)return'selling'; const e=c.endDate||''; if(!e)return d>-999?'active':'selling'; try{const ed=new Date(e);if(!isNaN(ed)&&Date.now()>ed)return'done';}catch(e){} return'active'; };
const bC  = p => p>=90?'var(--green)':p>=80?'#86efac':p>=70?'var(--yellow)':p>=60?'var(--amber)':'var(--red)';

// v8: spend reale da API campaigns (Meta+GAds), NON da Mktg_ExEd
function getRealSpend() {
  if(!DL) return 0;
  var total = 0;
  (DL.Meta_Campaigns||[]).forEach(function(c){ total += parseFloat(c.spend)||0; });
  (DL.GAds_Campaigns||[]).forEach(function(c){ total += parseFloat(c.cost)||0; });
  return total;
}
function getSpendForProd(prod) {
  if(!DL) return 0;
  var total = 0;
  (DL.Meta_Campaigns||[]).forEach(function(c){
    var s=(c.sigle||'').split(',').map(function(x){return nP(x.trim());}).filter(Boolean);
    if(s.indexOf(prod)>=0) total += (parseFloat(c.spend)||0) / s.length;  // split tra prodotti
  });
  (DL.GAds_Campaigns||[]).forEach(function(c){
    var s=(c.sigle||'').split(',').map(function(x){return nP(x.trim());}).filter(Boolean);
    if(s.indexOf(prod)>=0) total += (parseFloat(c.cost)||0) / s.length;
  });
  return total;
}

// ── Setup & Caricamento ──────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const u = localStorage.getItem('hfarm_datalake_url')||'';
  if (u) { document.getElementById('setup').classList.add('hidden'); document.getElementById('url-input').value=u; refreshData(); }
});
function saveUrl() { const u=document.getElementById('url-input').value.trim(); if(!u)return alert('Incolla URL.'); localStorage.setItem('hfarm_datalake_url',u); document.getElementById('setup').classList.add('hidden'); refreshData(); }
function switchTab(n,el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+n).classList.add('active');
  if(n==='prodotto'&&DL)populateProdSelect();
  if(n==='pl'&&DL)renderPL();
  if(n==='marketing'&&DL)renderMarketing();
}

async function refreshData() {
  const u = localStorage.getItem('hfarm_datalake_url'); if(!u)return;
  document.getElementById('corso-grid').innerHTML='<div class="loading"><div class="spinner"></div>Caricamento…</div>';
  try {
    let d;
    try { const r=await fetch(u,{redirect:'follow'}); if(!r.ok)throw new Error('HTTP '+r.status); d=await r.json(); }
    catch(fe) { d=await new Promise((res,rej)=>{const cb='_hf'+Date.now(),s=document.createElement('script');window[cb]=x=>{res(x);delete window[cb];s.remove();};s.src=u+(u.includes('?')?'&':'?')+'callback='+cb;s.onerror=()=>rej(new Error('Errore JSONP.'));document.head.appendChild(s);setTimeout(()=>rej(new Error('Timeout.')),30000);}); }
    if(d.error)throw new Error(d.error);
    DL=d; _corsiCache=null;
    const lr=DL._lastRefresh||'';
    document.getElementById('last-update').textContent=lr?'Agg. '+new Date(lr.replace('Ultimo refresh: ','')).toLocaleString('it-IT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'';
    renderAll();
  } catch(e) { document.getElementById('corso-grid').innerHTML='<div class="empty-state"><h3>Errore</h3><p>'+e.message+'</p></div>'; }
}

// ── Helper dati settimanali ──────────────────────────────────────
function calcRitardo(fk) {
  if(!DL||!DL.Mktg_ExEd_Weekly)return null;
  const today = new Date();
  const rows  = DL.Mktg_ExEd_Weekly.filter(r => r.fk===fk);
  if(!rows.length)return null;
  const cumul = m => rows.filter(r=>r.metrica===m&&new Date(r.data)<=today).reduce((s,r)=>s+(parseFloat(r.valore)||0),0);
  const lA=cumul('LEAD ATTESI'),lR=cumul('LEAD RICEVUTI');
  const cA=cumul('COLLOQUI ATTESI'),cR=cumul('COLLOQUI FISSATI');
  const iA=cumul('ISCRITTI ATTESI'),iR=cumul('ISCRITTI RICEVUTI');
  return {leadRitardo:lA>0&&lR<lA, colloquiRitardo:cA>0&&cR<cA, iscrittiRitardo:iA>0&&iR<iA, lA,lR,cA,cR,iA,iR, hasData:lA>0||cA>0||iA>0};
}

// ── Helper overlap candidati ─────────────────────────────────────
function calcOverlapDetail(nome) {
  if(!DL)return {total:0,courses:[]};
  const corsi = buildCorsi();
  const thisFks  = new Set(corsi.filter(c=>c.nome===nome).map(c=>c.fk));
  const emailsOf = (fks) => {
    const s = new Set();
    for(const g of (DL.Gravity_Forms||[])){if(!g.email||g.formTipo!=='candidatura')continue;const p=(g.codicecorso||'').toUpperCase().split('-');if(p.length>=3&&fks.has(nP(p[0])+'-'+p[2]))s.add(g.email.toLowerCase());}
    for(const d of (DL.Brevo_Deals||[])){if(!d.contactEmail)continue;const p=(d.sigla||'').toUpperCase().split('-');if(p.length>=3&&fks.has(nP(p[0])+'-'+p[2]))s.add(d.contactEmail.toLowerCase());}
    return s;
  };
  const thisE=emailsOf(thisFks);
  var overlapCourses=[];
  for(const c2 of corsi){
    if(c2.nome===nome)continue;
    var fk2Set=new Set([c2.fk]);
    var emails2=emailsOf(fk2Set);
    var cnt=0;for(const e of thisE){if(emails2.has(e))cnt++;}
    if(cnt>0)overlapCourses.push({name:c2.nome,count:cnt});
  }
  overlapCourses.sort((a,b)=>b.count-a.count);
  // Deduplica per nome corso
  var seen={},deduped=[];
  for(var oc of overlapCourses){if(!seen[oc.name]){seen[oc.name]=true;deduped.push(oc);}else{var existing=deduped.find(x=>x.name===oc.name);if(existing)existing.count+=oc.count;}}
  var total=0;for(var d2 of deduped)total+=d2.count;
  return {total:total,courses:deduped};
}

// ── buildCorsi() con cache ────────────────────────────────────────
function buildCorsi() {
  if(_corsiCache)return _corsiCache;

  const oFk={};

  const dFk={};
  for(const d of dls){const s=(d.sigla||'').toUpperCase().split('-');if(s.length>=3){const k=nP(s[0])+'-'+s[2];if(!dFk[k])dFk[k]=[];dFk[k].push(d);}}

  const gFk={};
  for(const g of gf){if(g.formTipo!=='candidatura')continue;const s=(g.codicecorso||'').toUpperCase().split('-');if(s.length>=3){const k=nP(s[0])+'-'+s[2];if(!gFk[k])gFk[k]=[];gFk[k].push(g);}}

  const eFk={};
  for(const g of gf){if(!g.email)continue;const s=(g.codicecorso||'').toUpperCase().split('-');if(s.length>=3)eFk[g.email.toLowerCase()]=nP(s[0])+'-'+s[2];}
  for(const d of dls){if(!d.contactEmail)continue;const s=(d.sigla||'').toUpperCase().split('-');if(s.length>=3)eFk[d.contactEmail.toLowerCase()]=nP(s[0])+'-'+s[2];}

  const now=new Date();
  const cFk={};
  for(const c of cal){let fk='';const cc=(c.utmContent||'').toUpperCase();if(cc){const p=cc.split('-');if(p.length>=3)fk=nP(p[0])+'-'+p[2];}if(!fk&&c.email)fk=eFk[c.email.toLowerCase()]||'';if(!fk)continue;if(!cFk[fk])cFk[fk]={a:[],p:[],f:[]};cFk[fk].a.push(c);const ed=c.evtStart?new Date(c.evtStart):null;if(ed&&ed<now)cFk[fk].p.push(c);else cFk[fk].f.push(c);}

  // Indice Mktg_ExEd — ACCUMULA budgetSpeso se la stessa FK appare più volte
  const mFk={};
  for(const m of mktg){
    const s=(m.sigla||'').toUpperCase().split('-');
    let fk='';
    if(s.length>=3)fk=nP(s[0])+'-'+s[2];
    else fk=(m.sigla||'').toUpperCase();
    if(!mFk[fk]){mFk[fk]={...m};}
    else{
      mFk[fk].budgetSpeso=(parseFloat(mFk[fk].budgetSpeso)||0)+(parseFloat(m.budgetSpeso)||0);
      mFk[fk].budgetPianificato=(parseFloat(mFk[fk].budgetPianificato)||0)+(parseFloat(m.budgetPianificato)||0);
      mFk[fk].leadAttesi=(parseFloat(mFk[fk].leadAttesi)||0)+(parseFloat(m.leadAttesi)||0);
      mFk[fk].leadRicevuti=(parseFloat(mFk[fk].leadRicevuti)||0)+(parseFloat(m.leadRicevuti)||0);
      mFk[fk].colloquiAttesi=(parseFloat(mFk[fk].colloquiAttesi)||0)+(parseFloat(m.colloquiAttesi)||0);
      mFk[fk].colloquiFissati=(parseFloat(mFk[fk].colloquiFissati)||0)+(parseFloat(m.colloquiFissati)||0);
      mFk[fk].iscrittiAttesi=(parseFloat(mFk[fk].iscrittiAttesi)||0)+(parseFloat(m.iscrittiAttesi)||0);
      mFk[fk].iscrittiRicevuti=(parseFloat(mFk[fk].iscrittiRicevuti)||0)+(parseFloat(m.iscrittiRicevuti)||0);
    }
  }

  const bFk={};
  for(const b of budgets){const s=(b.sigla||'').toUpperCase().split('-');if(s.length>=3)bFk[nP(s[0])+'-'+s[2]]=b;else if(b.sigla)bFk[b.sigla.toUpperCase()]=b;}

  _corsiCache = cfg.filter(c=>c.nome).map(c=>{
    const sig=(c.sigla||'').toUpperCase(),prod=nP(c.siglaProdotto),intake=(c.intake||'').toUpperCase(),fk=prod+'-'+intake;
    const sm=sFk[fk],oa=oFk[fk]||[],bd=dFk[fk]||[],ge=gFk[fk]||[],cl=cFk[fk]||{a:[],p:[],f:[]};
    const iOA=sm?sm.i:oa.length,rOA=sm?Math.round(sm.r):oa.reduce((s,r)=>s+(parseFloat(r.prezzoPagato)||0),0);
    const st={};bd.forEach(d=>{st[d.stage]=(st[d.stage]||0)+1;});
    const tgt=parseFloat(c.target)||0,pct=tgt>0?Math.round(iOA/tgt*100):0;
    const mk=mFk[sig]||mFk[fk]||{},bg=bFk[sig]||bFk[fk]||{};
    const cf=parseFloat(bg.costiFissi)||0,cps=parseFloat(bg.costoPerStudente)||0,ct=cf>0?(cf+(cps*iOA)):0;
    // v8: spend da campaigns API, NON da Mktg_ExEd
    // Divide proportionalmente tra edizioni dello stesso prodotto
    const mktgSpend = getSpendForProd(prod);
    const edCountForProd = cfg.filter(cc => nP(cc.siglaProdotto) === prod).length || 1;
    const mktgSpendPerEd = Math.round(mktgSpend / edCountForProd);
    return {...c,sig,prod,intake,fk,iscrittiOA:iOA,revenueOA:rOA,target:tgt,pctTarget:pct,pricing:parseFloat(c.pricing)||0,revTarget:parseFloat(c.revenueTarget)||0,brevoDeals:bd,brevoStages:st,brevoWon:st['Closed Won']||0,gfEntries:ge,gfCount:ge.length,calAll:cl.a.length,calPast:cl.p.length,calFuture:cl.f.length,oaStudenti:oa,brochureCount:(DL.Gravity_Forms||[]).filter(g=>g.formTipo==='brochure'&&(g.codicecorso||'').toUpperCase().includes(prod)).length,leads:parseFloat(c.leads)||0,interviewsDone:parseFloat(c.interviewsDone)||0,mktgBudget:parseFloat(mk.budgetPianificato||c.mktgBudget)||0,mktgPaid:mktgSpendPerEd,leadAttesi:parseFloat(mk.leadAttesi)||0,leadRicevuti:parseFloat(mk.leadRicevuti)||parseFloat(c.leads)||0,colloquiAttesi:parseFloat(mk.colloquiAttesi)||0,colloquiFissati:parseFloat(mk.colloquiFissati)||parseFloat(c.interviewsDone)||0,iscrittiAttesi:parseFloat(mk.iscrittiAttesi)||0,cpl:parseFloat(mk.cpl)||0,cpa:parseFloat(mk.cpa)||0,costiFissi:cf,costoPerStudente:cps,costiTotali:ct,commissione:parseFloat(c.commissione)||0,channels:sm?sm.ch:{b2b:{i:0,r:0},b2c:{i:0,r:0},jakala:{i:0,r:0},referral:{i:0,r:0},partner:{i:0,r:0},free:{i:0,r:0}}};
  });
  return _corsiCache;
}

// v8: daily trend chart builder with proper Italian dates
function buildDailyChart(mcd, prodFilter, courseStartDate) {
  var byDate={};
  mcd.forEach(function(r){
    var d=(r.date||'').substring(0,10);if(!d||d.length<10)return;
    if(prodFilter){var s=(r.sigle||'').split(',');if(!s.some(function(x){return nP(x.trim())===prodFilter;}))return;}
    if(!byDate[d])byDate[d]={spend:0,leads:0,clicks:0};
    byDate[d].spend+=parseFloat(r.spend)||0;
    byDate[d].leads+=parseInt(r.leads)||0;
    byDate[d].clicks+=parseInt(r.clicks)||0;
  });
  var dates=Object.keys(byDate).sort();
  if(!dates.length)return'';
  var maxSpend=Math.max.apply(null,dates.map(function(d){return byDate[d].spend;}))||1;
  var courseStartD=courseStartDate?new Date(courseStartDate):null;
  var campaignEndStr=courseStartD?new Date(courseStartD.getTime()-86400000).toISOString().split('T')[0]:'';
  var barH=50,topPad=18,dateH=30,totalH=barH+topPad+dateH;
  var h='<div style="position:relative;display:flex;gap:1px;height:'+totalH+'px;align-items:flex-end">';
  dates.forEach(function(d,idx){
    var s=byDate[d].spend,l=byDate[d].leads;
    var ht=Math.max(2,Math.round(s/maxSpend*barH));
    var dd=new Date(d+'T12:00:00Z');
    var isMonday=dd.getUTCDay()===1;
    var isFirst=dd.getUTCDate()===1;
    var isEnd=d===campaignEndStr;
    var sepStyle='';
    if(isFirst)sepStyle='border-left:2px solid var(--text1);';
    else if(isMonday)sepStyle='border-left:1px solid var(--border);';
    if(isEnd)sepStyle='border-left:2px dashed var(--amber);';
    h+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;'+sepStyle+'height:100%">';
    // Lead count zone
    h+='<div style="height:'+topPad+'px;display:flex;align-items:flex-end;justify-content:center">';
    if(l>0)h+='<span style="font-family:var(--mono);font-size:8px;font-weight:700;color:var(--green)">'+l+'</span>';
    h+='</div>';
    // Bar
    h+='<div style="width:100%;height:'+ht+'px;background:'+(l>0?'var(--green)':'var(--blue)')+';border-radius:2px 2px 0 0"></div>';
    // Date label - Italian format GG/mm
    var dayStr=String(dd.getUTCDate()).padStart(2,'0');
    var monStr=String(dd.getUTCMonth()+1).padStart(2,'0');
    var dateLabel=dayStr+'/'+monStr;
    var isBold=isFirst?';font-weight:700;color:var(--text1)':'';
    h+='<div style="height:'+dateH+'px;font-size:7px;color:var(--text3);writing-mode:vertical-lr;transform:rotate(180deg);overflow:hidden;white-space:nowrap'+isBold+'">'+dateLabel+'</div>';
    h+='</div>';
  });
  h+='</div>';
  h+='<div style="display:flex;gap:16px;font-size:11px;color:var(--text3);margin-top:4px"><span>■ <span style="color:var(--blue)">Spend</span></span><span>■ <span style="color:var(--green)">Giorni con lead</span></span>';
  if(campaignEndStr)h+='<span>┆ <span style="color:var(--amber)">Fine prevista</span></span>';
  h+='</div>';
  return h;
}

      '</div>';
  }).join('');
}

// ── TAB MARKETING ────────────────────────────────────────────────

    '<div class="kpi"><div class="kpi-label">Sessioni sito</div><div class="kpi-value" style="color:var(--purple)">'+ga4Sessions.toLocaleString('it-IT')+'</div><div class="kpi-sub">'+ga4p.length+' pagine tracciate</div></div></div>';

  // 3 card: Meta, Google, GA4
  h += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px">';
  var metaCPC=metaClicks>0?Math.round(metaSpend/metaClicks*100)/100:0;
  h += '<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px"><div class="prod-section-title">Meta Ads</div><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px"><div><div style="font-size:12px;color:var(--text3)">Speso</div><div style="font-family:var(--mono);font-size:20px;font-weight:700">'+fE(metaSpend)+'</div></div><div><div style="font-size:12px;color:var(--text3)">Click</div><div style="font-family:var(--mono);font-size:20px;font-weight:700">'+metaClicks.toLocaleString('it-IT')+'</div></div><div><div style="font-size:12px;color:var(--text3)">Impressions</div><div style="font-family:var(--mono);font-size:14px;font-weight:600">'+metaImpr.toLocaleString('it-IT')+'</div></div><div><div style="font-size:12px;color:var(--text3)">CPC medio</div><div style="font-family:var(--mono);font-size:14px;font-weight:600">'+fE(metaCPC)+'</div></div></div></div>';
  var gadsCPC=gadsClicks>0?Math.round(gadsSpend/gadsClicks*100)/100:0;
  h += '<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px"><div class="prod-section-title">Google Ads</div><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px"><div><div style="font-size:12px;color:var(--text3)">Speso</div><div style="font-family:var(--mono);font-size:20px;font-weight:700">'+fE(gadsSpend)+'</div></div><div><div style="font-size:12px;color:var(--text3)">Click</div><div style="font-family:var(--mono);font-size:20px;font-weight:700">'+gadsClicks.toLocaleString('it-IT')+'</div></div><div><div style="font-size:12px;color:var(--text3)">Conversioni</div><div style="font-family:var(--mono);font-size:14px;font-weight:600">'+Math.round(gadsConv)+'</div></div><div><div style="font-size:12px;color:var(--text3)">CPC medio</div><div style="font-family:var(--mono);font-size:14px;font-weight:600">'+fE(gadsCPC)+'</div></div></div></div>';
  h += '<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px"><div class="prod-section-title">GA4 Sito Web</div><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px"><div><div style="font-size:12px;color:var(--text3)">Sessioni</div><div style="font-family:var(--mono);font-size:20px;font-weight:700">'+ga4Sessions.toLocaleString('it-IT')+'</div></div><div><div style="font-size:12px;color:var(--text3)">Pagine corso</div><div style="font-family:var(--mono);font-size:20px;font-weight:700">'+ga4p.filter(function(p){return p.sigla;}).length+'</div></div><div><div style="font-size:12px;color:var(--text3)">Utenti totali</div><div style="font-family:var(--mono);font-size:14px;font-weight:600">'+ga4p.reduce(function(s,p){return s+(parseInt(p.users)||0);},0).toLocaleString('it-IT')+'</div></div><div><div style="font-size:12px;color:var(--text3)">Pageviews</div><div style="font-family:var(--mono);font-size:14px;font-weight:600">'+ga4p.reduce(function(s,p){return s+(parseInt(p.pageViews)||0);},0).toLocaleString('it-IT')+'</div></div></div></div>';
  h += '</div>';

  var ranked = mc.filter(function(c){return (parseInt(c.leads)||0)>0;}).sort(function(a,b){return (parseFloat(a.cpl)||999)-(parseFloat(b.cpl)||999);});
  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">';
  h += '<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px"><div class="prod-section-title">Ranking campagne Meta per CPL</div>';
  if(ranked.length){h+='<table class="mtable"><thead><tr><th>Campagna</th><th>Corso</th><th class="num">Stato</th><th class="num">Spend</th><th class="num">Lead</th><th class="num">CPL</th></tr></thead><tbody>';ranked.forEach(function(c){var col=parseFloat(c.cpl)<20?'var(--green)':parseFloat(c.cpl)<40?'var(--amber)':'var(--red)';var stBadge=c.status==='ACTIVE'?'<span style="background:var(--green-l);color:var(--green);padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700">ATTIVA</span>':'<span style="background:var(--bg);color:var(--text3);padding:2px 6px;border-radius:4px;font-size:10px">PAUSA</span>';h+='<tr><td style="font-size:12px">'+c.campaignName.substring(0,35)+'</td><td style="font-family:var(--mono);font-size:11px">'+(c.sigle||'—')+'</td><td>'+stBadge+'</td><td class="num">'+fE(parseFloat(c.spend))+'</td><td class="num">'+c.leads+'</td><td class="num" style="color:'+col+';font-weight:700">'+fE(parseFloat(c.cpl))+'</td></tr>';});h+='</tbody></table>';}else h+='<div style="font-size:13px;color:var(--text3)">Nessuna campagna con lead</div>';
  h += '</div>';

  var coursePages = ga4p.filter(function(p){return p.sigla;}).sort(function(a,b){return (parseInt(b.sessions)||0)-(parseInt(a.sessions)||0);});
  h += '<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px"><div class="prod-section-title">Top pagine corso (GA4)</div>';
  if(coursePages.length){h+='<table class="mtable"><thead><tr><th>Pagina</th><th>Corso</th><th class="num">Sessioni</th><th class="num">Utenti</th><th class="num">Engagement</th><th class="num">Bounce</th></tr></thead><tbody>';coursePages.slice(0,15).forEach(function(p){var eng=Math.round((parseFloat(p.engagementRate)||0)*100);var bounce=Math.round((parseFloat(p.bounceRate)||0)*100);h+='<tr><td style="font-size:11px">'+p.pagePath.substring(0,40)+'</td><td style="font-family:var(--mono);font-size:11px;font-weight:600">'+p.sigla+'</td><td class="num">'+parseInt(p.sessions)+'</td><td class="num">'+parseInt(p.users)+'</td><td class="num" style="color:var(--green)">'+eng+'%</td><td class="num" style="color:'+(bounce>5?'var(--red)':'var(--green)')+'">'+bounce+'%</td></tr>';});h+='</tbody></table>';}else h+='<div style="font-size:13px;color:var(--text3)">Nessuna pagina corso</div>';
  h += '</div></div>';

  // Meta vs Google
  h += '<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-top:16px"><div class="prod-section-title">Meta vs Google — dove conviene spendere?</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px"><div style="text-align:center;padding:16px;background:var(--blue-l);border-radius:var(--radius)"><div style="font-size:14px;font-weight:700;color:var(--blue)">Meta Ads</div><div style="font-family:var(--mono);font-size:28px;font-weight:700;margin:8px 0">'+fE(metaSpend)+'</div><div style="font-size:13px;color:var(--text2)">'+metaLeads+' lead  |  CPL '+fE(metaCPL)+'</div><div style="font-size:13px;color:var(--text2)">'+metaClicks.toLocaleString('it-IT')+' click  |  '+metaActive+' attive</div></div>';
  var gadsCPL=gadsConv>0?Math.round(gadsSpend/gadsConv):0;
  h += '<div style="text-align:center;padding:16px;background:var(--bg);border-radius:var(--radius)"><div style="font-size:14px;font-weight:700;color:var(--text1)">Google Ads</div><div style="font-family:var(--mono);font-size:28px;font-weight:700;margin:8px 0">'+fE(gadsSpend)+'</div><div style="font-size:13px;color:var(--text2)">'+Math.round(gadsConv)+' conversioni  |  CPC '+fE(gadsCPL)+'</div><div style="font-size:13px;color:var(--text2)">'+gadsClicks.toLocaleString('it-IT')+' click  |  '+gadsActive+' attive</div></div></div></div>';

  // Daily trend - v8: proper chart with Italian dates

    h += '<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-top:16px"><div class="prod-section-title">Trend giornaliero campagne Meta (ultimi 30gg)</div>';

  // Attribution

    var provSorted=Object.entries(provCount).sort(function(a,b){return b[1]-a[1];}),provMax=provSorted.length>0?provSorted[0][1]:1;
    provSorted.forEach(function(e){var w=Math.round(e[1]/provMax*100);h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-size:13px;min-width:150px;color:var(--text2)">'+e[0]+'</span><div style="flex:1;height:8px;background:var(--border-l);border-radius:4px"><div style="height:100%;width:'+w+'%;background:var(--hfarm);border-radius:4px"></div></div><span style="font-family:var(--mono);font-size:12px;font-weight:700;min-width:40px;text-align:right">'+e[1]+'</span></div>';});

  gf.forEach(function(g){if(g.formTipo!=='brochure')return;var cc=(g.codicecorso||'').toUpperCase().split('-');var prod=cc[0]?nP(cc[0]):'';if(!prod)return;if(!brochureByProd[prod])brochureByProd[prod]={downloads:0,emails:new Set()};brochureByProd[prod].downloads++;if(g.email)brochureByProd[prod].emails.add(g.email.toLowerCase());});

    var deals=DL.Brevo_Deals||[],siglaToName={};corsi.forEach(function(c){if(!siglaToName[c.prod])siglaToName[c.prod]=c.nome;});
    for(var prod in brochureByProd){var b=brochureByProd[prod],converted=0,won=0;deals.forEach(function(d){if(!d.contactEmail)return;var dp=(d.sigla||'').split('-')[0]||'';if(nP(dp)===prod&&b.emails.has(d.contactEmail.toLowerCase())){converted++;if(d.stage==='Closed Won')won++;}});
      var dealPct=b.emails.size>0?Math.round(converted/b.emails.size*100):0;

    }
    h+='</tbody></table></div>';
  }
  ct.innerHTML = h;
}
